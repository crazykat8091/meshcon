<svg width="1050" height="1300" viewBox="0 0 1050 1300" xmlns="http://www.w3.org/2000/svg">
  <title>MeshCon Business Card - Light Mode</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;family=Inter:wght@400;500&amp;display=swap');
      .text-mono { font-family: 'JetBrains Mono', monospace; }
      .sans-bold { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; }
    </style>
  </defs>
  <!-- BUSINESS CARD FRONT -->
  <g transform="translate(0,0)">
    <rect width="1050" height="600" fill="#fcfaf8" rx="20"/>
    
    <!-- MeshCon Logo Container -->
    <image href="MeshCon-Logo-light.png" x="225" y="170" width="600" height="218" preserveAspectRatio="xMidYMid meet"/>
    <text x="525" y="440" text-anchor="middle" class="text-mono" font-weight="700" font-size="20" fill="#bf5a00" letter-spacing="4">// EXPERT ON-SITE TECH SUPPORT</text>
    <rect x="0" y="590" width="1050" height="10" fill="#bf5a00"/>
  </g>

  <text x="525" y="660" text-anchor="middle" font-family="monospace" font-size="14" fill="#a0a0a0">MESHCON BRANDING · FRONT (TOP) / BACK (BOTTOM)</text>

  <!-- BUSINESS CARD BACK -->
  <g transform="translate(0,700)">
    <rect width="1050" height="600" fill="#fcfaf8" rx="20"/>
    <rect width="8" height="600" fill="#bf5a00"/>
    
    <g transform="translate(60, 80)">
      <text class="sans-bold" font-size="44" fill="#000000">Bodin Praphanthongchai (Pete)</text>
      <text y="50" class="text-mono" font-weight="500" font-size="22" fill="#bf5a00">Systems Specialist // On-Site Expert</text>
      <g transform="translate(0, 160)" font-family="Inter, sans-serif" font-size="20">
        <text fill="#4a443b" class="text-mono">WEB:</text>
        <text x="100" fill="#1a1612">www.meshcon.tech</text>
        <text y="50" fill="#4a443b" class="text-mono">MAIL:</text>
        <text x="100" y="50" fill="#1a1612">info@meshcon.tech</text>
        <text y="100" fill="#4a443b" class="text-mono">PHONE:</text>
        <text x="100" y="100" fill="#1a1612">+1 (000) 000-0000</text>
        <text y="150" fill="#4a443b" class="text-mono">AREA:</text>
        <text x="100" y="150" fill="#1a1612">Chicago North/NW</text>
      </g>
    </g>

    <!-- WhatsApp QR Code Section -->
    <g transform="translate(60, 420)">
      <rect width="140" height="140" fill="#ffffff" stroke="#e8e4df" rx="12"/>
      <text x="155" y="30" class="text-mono" font-size="14" fill="#bf5a00" font-weight="700">SCAN TO CHAT</text>
      <text x="155" y="55" font-family="Inter, sans-serif" font-size="13" fill="#4a443b">Reach Pete directly on</text>
      <text x="155" y="55" font-family="Inter, sans-serif" font-size="13" fill="#4a443b">Reach us directly on</text>
      <text x="155" y="75" font-family="Inter, sans-serif" font-size="13" fill="#4a443b">WhatsApp for secure,</text>
      <text x="155" y="95" font-family="Inter, sans-serif" font-size="13" fill="#4a443b">on-site support.</text>
      <image href="whatsapp-qr.png" x="20" y="20" width="100" height="100"/>

      <!-- Social Icons Group -->
      <g transform="translate(155, 110) scale(0.85)" stroke="#bf5a00" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        <g transform="translate(35, 0)"><path d="M4 4l11.733 16h4.267l-11.733 -16zM4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"/></g>
        <g transform="translate(70, 0)"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></g>
        <g transform="translate(105, 0)"><path d="M9 12a1 1 0 1 0 2 0 1 1 0 0 0-2 0m4 0a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/><path d="M7.5 8.5c1.4-1.1 3.2-1.5 4.5-1.5s3.1.4 4.5 1.5c.7.5 1.5.5 2.2 0l.5-.4c1-1 2.3-1.6 3.7-1.6h.1c.6 0 1.1.5 1.1 1.1v2.1c0 3.7-2 7.1-5.3 8.8l-.5.2c-.8.4-1.7.4-2.5 0l-.5-.2C12 17.1 10 13.7 10 10V7.9c0-.6.5-1.1 1.1-1.1h.1c1.4 0 2.7.6 3.7 1.6l.5.4c.7.5 1.5.5 2.2 0"/></g>
      </g>
    </g>

    <g transform="translate(620, 180)">
      <rect width="370" height="350" rx="16" fill="#ffffff" stroke="#d8d2c8" stroke-width="1.5"/>
      <g transform="translate(30, 45)">
        <text class="text-mono" font-weight="700" font-size="18" fill="#bf5a00" letter-spacing="1">CORE SERVICES:</text>
        <g transform="translate(0, 40)" font-family="Inter, sans-serif" font-size="17" fill="#1a1612">
          <text y="0">● PC &amp; Laptop Performance</text>
          <text y="35">● Mesh WiFi &amp; Networking</text>
          <text y="70">● Secure NAS &amp; Backups</text>
          <text y="105">● Smart Home &amp; IP Cams</text>
          <text y="140">● Senior-Friendly Lessons</text>
          <text y="175">● Small Business Support</text>
        </g>
      </g>
    </g>
    <text x="1020" y="570" text-anchor="end" class="text-mono" font-size="12" fill="#4a443b" opacity="0.3">v1.23</text>
  </g>
</svg>